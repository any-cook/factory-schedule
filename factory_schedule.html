<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工場スケジュール管理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
  :root {
    --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--border:#30363d;
    --accent:#f0883e;--accent2:#58a6ff;--danger:#f85149;--success:#3fb950;
    --text:#e6edf3;--text-muted:#7d8590;--text-dim:#484f58;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
  .logo{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;color:var(--accent);}
  .logo span{color:var(--text-muted);}
  .header-right{margin-left:auto;display:flex;gap:10px;align-items:center;}
  .notif-badge{background:var(--danger);color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px;display:none;}
  .notif-badge.show{display:inline;}
  .app{display:flex;flex:1;overflow:hidden;height:calc(100vh - 57px);}
  .sidebar{width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .sidebar-section{padding:16px;border-bottom:1px solid var(--border);}
  .sidebar-section h3{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
  .factory-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;cursor:pointer;font-size:14px;transition:background .15s;border:1px solid transparent;}
  .factory-item:hover{background:var(--surface2);}
  .factory-item.active{background:rgba(240,136,62,.12);border-color:rgba(240,136,62,.3);}
  .factory-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .factory-count{font-size:11px;background:var(--surface2);color:var(--text-muted);border-radius:10px;padding:1px 7px;font-family:'JetBrains Mono',monospace;}
  .person-list{display:flex;flex-direction:column;gap:3px;max-height:240px;overflow-y:auto;}
  .person-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:13px;transition:background .15s;}
  .person-item:hover{background:var(--surface2);}
  .person-item.selected{background:rgba(88,166,255,.12);}
  .avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
  .person-role{font-size:10px;color:var(--text-muted);margin-top:1px;}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .view-tabs{display:flex;background:var(--bg);border-radius:6px;padding:3px;gap:2px;}
  .view-tab{padding:5px 14px;border-radius:4px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--text-muted);font-family:'Noto Sans JP',sans-serif;}
  .view-tab.active{background:var(--surface);color:var(--text);}
  .date-nav{display:flex;align-items:center;gap:8px;}
  .nav-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:5px;cursor:pointer;font-size:13px;transition:background .15s;}
  .nav-btn:hover{background:var(--border);}
  .date-label{font-size:14px;font-weight:500;min-width:160px;text-align:center;}
  .toolbar-right{margin-left:auto;}
  .btn{padding:6px 14px;border-radius:6px;font-size:13px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;border:none;font-weight:500;transition:all .15s;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{background:#e07528;}
  .btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--border);}
  .btn-ghost:hover{color:var(--text);background:var(--surface2);}
  .btn-sm{padding:4px 10px;font-size:12px;}
  .btn-danger{background:var(--danger);color:#fff;}
  .calendar-area{flex:1;overflow-y:auto;padding:20px;}
  .week-grid{display:grid;grid-template-columns:70px repeat(7,1fr);border:1px solid var(--border);border-radius:8px;overflow:hidden;position:relative;}
  .day-header{background:var(--surface);border-left:1px solid var(--border);padding:8px 6px;text-align:center;border-bottom:1px solid var(--border);}
  .day-header .day-name{font-size:11px;color:var(--text-muted);}
  .day-header .day-num{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;}
  .day-header.today .day-num{color:var(--accent);}
  .time-header-cell{background:var(--surface);border-bottom:1px solid var(--border);}
  .time-label{background:var(--surface);border-top:1px solid var(--border);padding:4px 6px;font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;text-align:right;}
  .day-cell{border-left:1px solid var(--border);border-top:1px solid var(--border);min-height:48px;cursor:pointer;transition:background .1s;}
  .day-cell:hover{background:rgba(255,255,255,.02);}
  .schedule-block{position:absolute;border-radius:5px;padding:3px 6px;font-size:11px;font-weight:500;cursor:pointer;overflow:hidden;border-left:3px solid;transition:transform .1s,box-shadow .1s;z-index:2;}
  .schedule-block:hover{transform:scale(1.02);box-shadow:0 4px 12px rgba(0,0,0,.4);z-index:10;}
  .block-person{font-size:10px;opacity:.8;}
  .month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .month-day-header{background:var(--surface);text-align:center;padding:8px;font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;}
  .month-cell{background:var(--surface);min-height:90px;padding:6px;cursor:pointer;transition:background .1s;}
  .month-cell:hover{background:var(--surface2);}
  .month-cell.other-month{opacity:.4;}
  .month-cell.today{background:rgba(240,136,62,.06);}
  .month-day-num{font-size:13px;font-weight:600;font-family:'JetBrains Mono',monospace;margin-bottom:4px;color:var(--text-muted);}
  .month-cell.today .month-day-num{color:var(--accent);}
  .month-event{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
  .person-grid-header{display:grid;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10;}
  .person-row{display:grid;border-bottom:1px solid var(--border);}
  .person-row-label{padding:10px 12px;background:var(--surface);border-right:1px solid var(--border);display:flex;align-items:center;gap:8px;}
  .person-day-cell{padding:5px;border-right:1px solid var(--border);min-height:65px;cursor:pointer;}
  .person-day-cell:hover{background:var(--surface2);}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s;}
  .modal-overlay.open{opacity:1;pointer-events:all;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;width:480px;max-width:95vw;transform:translateY(10px);transition:transform .2s;overflow:hidden;}
  .modal-overlay.open .modal{transform:translateY(0);}
  .modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .modal-title{font-size:16px;font-weight:600;}
  .modal-close{background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;}
  .modal-body{padding:20px;display:flex;flex-direction:column;gap:14px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:12px;color:var(--text-muted);font-weight:500;}
  .field input,.field select,.field textarea{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 12px;font-size:14px;font-family:'Noto Sans JP',sans-serif;outline:none;transition:border-color .15s;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent2);}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .notif-toggle{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;}
  .notif-toggle span{font-size:13px;flex:1;}
  .toggle-switch{position:relative;width:40px;height:22px;flex-shrink:0;}
  .toggle-switch input{display:none;}
  .toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:11px;cursor:pointer;transition:background .2s;}
  .toggle-slider::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .2s;}
  .toggle-switch input:checked + .toggle-slider{background:var(--accent);}
  .toggle-switch input:checked + .toggle-slider::after{transform:translateX(18px);}
  .modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
  .notif-panel{position:fixed;top:57px;right:0;width:340px;background:var(--surface);border:1px solid var(--border);border-radius:0 0 0 10px;z-index:200;transform:translateX(100%);transition:transform .25s;max-height:70vh;overflow-y:auto;}
  .notif-panel.open{transform:translateX(0);}
  .notif-panel-header{padding:14px 16px;border-bottom:1px solid var(--border);font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:space-between;}
  .notif-item{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;display:flex;gap:10px;}
  .notif-time{font-size:11px;color:var(--text-muted);margin-top:3px;}
  .notif-empty{padding:24px;text-align:center;color:var(--text-muted);font-size:13px;}
  .toast-container{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:2000;}
  .toast{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:12px 16px;font-size:13px;max-width:300px;box-shadow:0 8px 24px rgba(0,0,0,.5);animation:slideIn .3s ease;}
  @keyframes slideIn{from{transform:translateX(60px);opacity:0;}to{transform:translateX(0);opacity:1;}}
  .empty-state{text-align:center;color:var(--text-muted);font-size:13px;padding:60px 40px;}
  .empty-state .icon{font-size:36px;margin-bottom:12px;}
  .add-row{display:flex;gap:6px;margin-top:8px;}
  .add-row input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:5px 8px;font-size:12px;font-family:'Noto Sans JP',sans-serif;outline:none;}
  .add-row input:focus{border-color:var(--accent2);}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
  select option{background:#1c2128;}
</style>
</head>
<body>

<header>
  <div class="logo">🏭 <span>//</span> 工場スケジュール</div>
  <div class="header-right">
    <button class="btn btn-ghost" id="notifBtn" onclick="toggleNotifPanel()" style="position:relative;">
      🔔 通知 <span class="notif-badge" id="notifBadge">0</span>
    </button>
    <button class="btn btn-primary" onclick="openNewModal()">＋ 予定追加</button>
  </div>
</header>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-section">
      <h3>工場</h3>
      <div id="factoryList" style="display:flex;flex-direction:column;gap:4px;"></div>
      <div class="add-row">
        <input id="newFactoryInput" placeholder="工場名" onkeydown="if(event.key==='Enter')addFactory()">
        <button class="btn btn-ghost btn-sm" onclick="addFactory()">追加</button>
      </div>
    </div>
    <div class="sidebar-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
      <h3>担当者 <span id="filterLabel" style="color:var(--accent2);font-size:10px;font-weight:400;"></span></h3>
      <div class="person-list" id="personList"></div>
      <div class="add-row">
        <input id="newPersonName" placeholder="担当者名" onkeydown="if(event.key==='Enter')addPerson()">
        <button class="btn btn-ghost btn-sm" onclick="addPerson()">追加</button>
      </div>
    </div>
    <div class="sidebar-section">
      <div id="factoryLegend" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
    </div>
  </aside>

  <div class="main">
    <div class="toolbar">
      <div class="view-tabs">
        <button class="view-tab active" onclick="setView('week',this)">週</button>
        <button class="view-tab" onclick="setView('month',this)">月</button>
        <button class="view-tab" onclick="setView('person',this)">人別</button>
      </div>
      <div class="date-nav">
        <button class="nav-btn" onclick="navigate(-1)">‹</button>
        <div class="date-label" id="dateLabel"></div>
        <button class="nav-btn" onclick="navigate(1)">›</button>
        <button class="nav-btn" onclick="goToday()" style="font-size:12px;">今日</button>
      </div>
      <div class="toolbar-right">
        <span id="filterInfo" style="font-size:12px;color:var(--text-muted);"></span>
      </div>
    </div>
    <div class="calendar-area" id="calendarArea"></div>
  </div>
</div>

<div class="notif-panel" id="notifPanel">
  <div class="notif-panel-header">
    通知ログ
    <button class="btn btn-ghost btn-sm" onclick="clearNotifs()">全消去</button>
  </div>
  <div id="notifList"></div>
</div>

<div class="toast-container" id="toastContainer"></div>

<!-- Modal -->
<div class="modal-overlay" id="scheduleModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">予定を追加</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>タイトル *</label>
        <input id="fTitle" placeholder="作業内容・ミーティングなど">
      </div>
      <div class="field-row">
        <div class="field"><label>開始日時</label><input id="fStart" type="datetime-local"></div>
        <div class="field"><label>終了日時</label><input id="fEnd" type="datetime-local"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>工場</label><select id="fFactory"></select></div>
        <div class="field"><label>担当者</label><select id="fPerson"></select></div>
      </div>
      <div class="field">
        <label>メモ</label>
        <textarea id="fNote" rows="2" style="resize:vertical;" placeholder="備考・詳細"></textarea>
      </div>
      <div class="notif-toggle">
        <span>🔔 通知を設定する</span>
        <label class="toggle-switch">
          <input type="checkbox" id="fNotifOn" onchange="toggleNotifTime()">
          <div class="toggle-slider"></div>
        </label>
      </div>
      <div id="notifTimeArea" style="display:none;">
        <div class="field">
          <label>通知タイミング</label>
          <select id="fNotifMin">
            <option value="5">5分前</option>
            <option value="10">10分前</option>
            <option value="15" selected>15分前</option>
            <option value="30">30分前</option>
            <option value="60">1時間前</option>
            <option value="120">2時間前</option>
            <option value="1440">1日前</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="deleteBtn" style="display:none;margin-right:auto;" onclick="deleteSchedule()">削除</button>
      <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveSchedule()">保存</button>
    </div>
  </div>
</div>

<script>
const COLORS=['#f0883e','#58a6ff','#3fb950','#d29922','#bc8cff','#f85149','#39c5cf','#f778ba'];

let factories=[
  {id:'f1',name:'第1工場',color:COLORS[0]},
  {id:'f2',name:'第2工場',color:COLORS[1]},
  {id:'f3',name:'第3工場',color:COLORS[2]},
];
let persons=[
  {id:'p1',name:'田中 太郎',factoryId:'f1',role:'ライン長'},
  {id:'p2',name:'山田 花子',factoryId:'f1',role:'オペレーター'},
  {id:'p3',name:'鈴木 一郎',factoryId:'f2',role:'ライン長'},
  {id:'p4',name:'佐藤 次郎',factoryId:'f2',role:'オペレーター'},
  {id:'p5',name:'高橋 美咲',factoryId:'f3',role:'ライン長'},
];
let schedules=[
  {id:'s1',title:'朝礼・点検',start:todayAt(8,0),end:todayAt(8,30),factoryId:'f1',personId:'p1',note:'',notif:true,notifMin:15},
  {id:'s2',title:'生産ライン稼働',start:todayAt(9,0),end:todayAt(12,0),factoryId:'f1',personId:'p2',note:'',notif:false,notifMin:15},
  {id:'s3',title:'安全講習',start:todayAt(14,0),end:todayAt(16,0),factoryId:'f2',personId:'p3',note:'全員参加必須',notif:true,notifMin:30},
  {id:'s4',title:'設備メンテ',start:tomorrowAt(10,0),end:tomorrowAt(12,0),factoryId:'f3',personId:'p5',note:'',notif:true,notifMin:60},
];
let notifications=[];
let notifTimers=[];
let currentView='week';
let currentDate=new Date();
let selectedFactoryId=null;
let selectedPersonIds=[];
let editingId=null;

function todayAt(h,m){const d=new Date();d.setHours(h,m,0,0);return d.toISOString();}
function tomorrowAt(h,m){const d=new Date();d.setDate(d.getDate()+1);d.setHours(h,m,0,0);return d.toISOString();}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function pad(n){return String(n).padStart(2,'0');}
function toInput(iso){const d=new Date(iso);return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function dtLocalStr(date,h,m){const d=new Date(date);d.setHours(h,m,0,0);return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(h)}:${pad(m)}`;}
function fmtTime(iso){const d=new Date(iso);return`${pad(d.getHours())}:${pad(d.getMinutes())}`;}

function init(){
  if('Notification'in window&&Notification.permission==='default')Notification.requestPermission();
  renderSidebar();renderCalendar();scheduleNotifications();
  setInterval(()=>{},60000);
  // demo notif after 2s
  setTimeout(()=>{
    addNotif('🔔','第1工場 | 田中 太郎 — 朝礼・点検','08:00 開始 (15分前のデモ)');
  },1500);
}

// ===== SIDEBAR =====
function renderSidebar(){
  const fl=document.getElementById('factoryList');
  fl.innerHTML=`<div class="factory-item ${!selectedFactoryId?'active':''}" onclick="selectFactory(null)">
    <div class="factory-dot" style="background:#7d8590;"></div>
    <span style="flex:1;">全工場</span>
    <span class="factory-count">${schedules.length}</span>
  </div>`+factories.map(f=>`
    <div class="factory-item ${selectedFactoryId===f.id?'active':''}" onclick="selectFactory('${f.id}')">
      <div class="factory-dot" style="background:${f.color};"></div>
      <span style="flex:1;">${f.name}</span>
      <span class="factory-count">${schedules.filter(s=>s.factoryId===f.id).length}</span>
    </div>`).join('');

  const filtered=selectedFactoryId?persons.filter(p=>p.factoryId===selectedFactoryId):persons;
  document.getElementById('filterLabel').textContent=selectedFactoryId?`（${factories.find(f=>f.id===selectedFactoryId)?.name}）`:'';
  const pl=document.getElementById('personList');
  pl.innerHTML=filtered.length===0?'<div style="padding:8px;color:var(--text-dim);font-size:12px;">担当者なし</div>':filtered.map(p=>{
    const fc=factories.find(f=>f.id===p.factoryId);
    const sel=selectedPersonIds.includes(p.id);
    const ini=p.name.replace(' ','').slice(0,2);
    return`<div class="person-item ${sel?'selected':''}" onclick="togglePerson('${p.id}')">
      <div class="avatar" style="background:${fc?.color||'#888'}22;color:${fc?.color||'#888'};">${ini}</div>
      <div style="flex:1;"><div style="font-size:13px;">${p.name}</div><div class="person-role">${p.role}</div></div>
      ${sel?'<span style="color:var(--accent2);">✓</span>':''}
    </div>`;
  }).join('');

  document.getElementById('factoryLegend').innerHTML=factories.map(f=>
    `<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);">
      <div style="width:8px;height:8px;border-radius:2px;background:${f.color};"></div>${f.name}</div>`
  ).join('');

  const fi=document.getElementById('filterInfo');
  if(selectedPersonIds.length>0) fi.textContent=`${selectedPersonIds.length}名選択中`;
  else fi.textContent='';
}

function selectFactory(id){selectedFactoryId=id;selectedPersonIds=[];renderSidebar();renderCalendar();}
function togglePerson(id){const i=selectedPersonIds.indexOf(id);if(i===-1)selectedPersonIds.push(id);else selectedPersonIds.splice(i,1);renderSidebar();renderCalendar();}
function addFactory(){
  const inp=document.getElementById('newFactoryInput');const name=inp.value.trim();if(!name)return;
  factories.push({id:'f'+Date.now(),name,color:COLORS[factories.length%COLORS.length]});
  inp.value='';renderSidebar();renderCalendar();showToast('🏭 '+name+' を追加しました');
}
function addPerson(){
  const inp=document.getElementById('newPersonName');const name=inp.value.trim();if(!name)return;
  const fId=selectedFactoryId||factories[0]?.id;if(!fId){showToast('⚠ 先に工場を追加してください');return;}
  persons.push({id:'p'+Date.now(),name,factoryId:fId,role:'スタッフ'});
  inp.value='';renderSidebar();renderCalendar();showToast('👤 '+name+' を追加しました');
}

// ===== VIEW =====
function setView(v,el){currentView=v;document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderCalendar();}
function navigate(d){
  if(currentView==='month'){currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()+d,1);}
  else currentDate=addDays(currentDate,7*d);
  renderCalendar();
}
function goToday(){currentDate=new Date();renderCalendar();}

function getWeekStart(d){const r=new Date(d);const dow=(r.getDay()+6)%7;r.setDate(r.getDate()-dow);r.setHours(0,0,0,0);return r;}

function filteredScheds(){
  let s=schedules;
  if(selectedFactoryId)s=s.filter(x=>x.factoryId===selectedFactoryId);
  if(selectedPersonIds.length>0)s=s.filter(x=>selectedPersonIds.includes(x.personId));
  return s;
}

function renderCalendar(){
  const area=document.getElementById('calendarArea');
  if(currentView==='week')renderWeek(area);
  else if(currentView==='month')renderMonth(area);
  else renderPerson(area);
}

// ===== WEEK =====
function renderWeek(area){
  const ws=getWeekStart(currentDate);
  const days=Array.from({length:7},(_,i)=>addDays(ws,i));
  const today=new Date();today.setHours(0,0,0,0);
  const dayNames=['月','火','水','木','金','土','日'];
  document.getElementById('dateLabel').textContent=`${ws.getFullYear()}年${ws.getMonth()+1}月${ws.getDate()}日〜`;
  const hours=Array.from({length:17},(_,i)=>i+7);// 7〜23

  let html=`<div class="week-grid" id="weekGrid">`;
  html+=`<div class="time-header-cell"></div>`;
  days.forEach((d,i)=>{
    const isTd=d.getTime()===today.getTime();
    html+=`<div class="day-header ${isTd?'today':''}"><div class="day-name">${dayNames[i]}</div><div class="day-num">${d.getDate()}</div></div>`;
  });
  hours.forEach(h=>{
    html+=`<div class="time-label">${pad(h)}:00</div>`;
    days.forEach((d,di)=>{
      html+=`<div class="day-cell" onclick="openNewModalAt('${dtLocalStr(d,h,0)}')"></div>`;
    });
  });
  html+=`</div>`;
  area.innerHTML=html;

  // Overlay blocks
  const grid=document.getElementById('weekGrid');
  const scheds=filteredScheds();
  scheds.forEach(s=>{
    const sd=new Date(s.start),ed=new Date(s.end);
    const di=days.findIndex(d=>{const dc=new Date(d);dc.setHours(0,0,0,0);const sc=new Date(sd);sc.setHours(0,0,0,0);return dc.getTime()===sc.getTime();});
    if(di===-1)return;
    const sh=sd.getHours()+sd.getMinutes()/60;
    const eh=ed.getHours()+ed.getMinutes()/60;
    const top=(sh-7)*48+36;// header ~36px
    const h=Math.max((eh-sh)*48,18);
    const left=`calc(${(di+1)/8*100}% + 3px)`;
    const width=`calc(${1/8*100}% - 6px)`;
    const fc=factories.find(f=>f.id===s.factoryId);
    const p=persons.find(p=>p.id===s.personId);
    const c=fc?.color||'#888';
    const b=document.createElement('div');
    b.className='schedule-block';
    b.style.cssText=`top:${top}px;height:${h}px;left:${left};width:${width};background:${c}22;border-color:${c};color:${c};`;
    b.innerHTML=`<div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${s.title}</div>${p?`<div class="block-person">${p.name}</div>`:''}`;
    b.onclick=(e)=>{e.stopPropagation();openEditModal(s.id);};
    grid.appendChild(b);
  });
}

// ===== MONTH =====
function renderMonth(area){
  const y=currentDate.getFullYear(),m=currentDate.getMonth();
  document.getElementById('dateLabel').textContent=`${y}年${m+1}月`;
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const startDow=(first.getDay()+6)%7;
  const today=new Date();today.setHours(0,0,0,0);
  const dayNames=['月','火','水','木','金','土','日'];
  let cells=[];
  for(let i=0;i<startDow;i++)cells.push({date:addDays(first,i-startDow),other:true});
  for(let d=1;d<=last.getDate();d++)cells.push({date:new Date(y,m,d),other:false});
  while(cells.length%7!==0)cells.push({date:addDays(last,cells.length-startDow-last.getDate()+1),other:true});
  const scheds=filteredScheds();
  let html=`<div class="month-grid">`;
  dayNames.forEach(d=>html+=`<div class="month-day-header">${d}</div>`);
  cells.forEach(c=>{
    const isTd=c.date.getTime()===today.getTime();
    const ds=scheds.filter(s=>{const sd=new Date(s.start);sd.setHours(0,0,0,0);return sd.getTime()===c.date.getTime();});
    const ds2=dtLocalStr(c.date,9,0);
    html+=`<div class="month-cell ${c.other?'other-month':''} ${isTd?'today':''}" onclick="openNewModalAt('${ds2}')">
      <div class="month-day-num">${c.date.getDate()}</div>
      ${ds.slice(0,3).map(s=>{const fc=factories.find(f=>f.id===s.factoryId);return`<div class="month-event" style="background:${fc?.color||'#888'}33;color:${fc?.color||'#888'};" onclick="event.stopPropagation();openEditModal('${s.id}')">${s.title}</div>`;}).join('')}
      ${ds.length>3?`<div style="font-size:10px;color:var(--text-muted);">+${ds.length-3}件</div>`:''}
    </div>`;
  });
  html+=`</div>`;
  area.innerHTML=html;
}

// ===== PERSON =====
function renderPerson(area){
  const ws=getWeekStart(currentDate);
  const days=Array.from({length:7},(_,i)=>addDays(ws,i));
  const today=new Date();today.setHours(0,0,0,0);
  const dayNames=['月','火','水','木','金','土','日'];
  document.getElementById('dateLabel').textContent=`${ws.getFullYear()}年${ws.getMonth()+1}月${ws.getDate()}日〜`;
  const fp=selectedPersonIds.length>0?persons.filter(p=>selectedPersonIds.includes(p.id)):
    (selectedFactoryId?persons.filter(p=>p.factoryId===selectedFactoryId):persons);
  if(fp.length===0){area.innerHTML='<div class="empty-state"><div class="icon">👤</div>左のサイドバーから担当者を選択してください</div>';return;}
  const cols=`180px repeat(7,1fr)`;
  let html=`<div>`;
  // sticky header
  html+=`<div style="display:grid;grid-template-columns:${cols};position:sticky;top:0;z-index:10;background:var(--surface);border-bottom:1px solid var(--border);">
    <div style="padding:8px 12px;border-right:1px solid var(--border);font-size:11px;color:var(--text-muted);">担当者</div>
    ${days.map((d,i)=>{const isTd=d.getTime()===today.getTime();return`<div style="text-align:center;padding:8px 4px;border-right:1px solid var(--border);">
      <div style="font-size:10px;color:var(--text-muted);">${dayNames[i]}</div>
      <div style="font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace;${isTd?'color:var(--accent)':''}">${d.getDate()}</div>
    </div>`;}).join('')}
  </div>`;
  fp.forEach(p=>{
    const fc=factories.find(f=>f.id===p.factoryId);
    const c=fc?.color||'#888';
    const ini=p.name.replace(' ','').slice(0,2);
    html+=`<div style="display:grid;grid-template-columns:${cols};border-bottom:1px solid var(--border);">
      <div class="person-row-label">
        <div class="avatar" style="background:${c}22;color:${c};">${ini}</div>
        <div><div style="font-size:13px;font-weight:500;">${p.name}</div><div style="font-size:10px;color:var(--text-muted);">${p.role}</div></div>
      </div>
      ${days.map(d=>{
        const ds=schedules.filter(s=>{if(s.personId!==p.id)return false;const sd=new Date(s.start);sd.setHours(0,0,0,0);return sd.getTime()===d.getTime();});
        const ds2=dtLocalStr(d,9,0);
        return`<div class="person-day-cell" onclick="openNewModalAtPerson('${ds2}','${p.id}')">
          ${ds.map(s=>{const sf=factories.find(f=>f.id===s.factoryId);const sc=sf?.color||'#888';return`<div class="month-event" style="background:${sc}33;color:${sc};" onclick="event.stopPropagation();openEditModal('${s.id}')">${s.title}</div>`;}).join('')}
        </div>`;
      }).join('')}
    </div>`;
  });
  html+=`</div>`;
  area.innerHTML=html;
}

// ===== MODAL =====
function openNewModal(){
  editingId=null;
  document.getElementById('modalTitle').textContent='予定を追加';
  document.getElementById('deleteBtn').style.display='none';
  document.getElementById('fTitle').value='';
  document.getElementById('fNote').value='';
  document.getElementById('fNotifOn').checked=false;
  document.getElementById('notifTimeArea').style.display='none';
  const now=new Date();
  document.getElementById('fStart').value=dtLocalStr(now,now.getHours(),0);
  document.getElementById('fEnd').value=dtLocalStr(now,now.getHours()+1,0);
  populateSelects(null,null);
  document.getElementById('scheduleModal').classList.add('open');
}
function openNewModalAt(dt,personId=null){
  openNewModal();
  document.getElementById('fStart').value=dt;
  const e=new Date(dt);e.setHours(e.getHours()+1);
  document.getElementById('fEnd').value=`${e.getFullYear()}-${pad(e.getMonth()+1)}-${pad(e.getDate())}T${pad(e.getHours())}:${pad(e.getMinutes())}`;
  if(personId){const p=persons.find(x=>x.id===personId);if(p)populateSelects(p.factoryId,personId);}
}
function openNewModalAtPerson(dt,pid){openNewModalAt(dt,pid);}
function openEditModal(id){
  const s=schedules.find(x=>x.id===id);if(!s)return;
  editingId=id;
  document.getElementById('modalTitle').textContent='予定を編集';
  document.getElementById('deleteBtn').style.display='inline-block';
  document.getElementById('fTitle').value=s.title;
  document.getElementById('fNote').value=s.note||'';
  document.getElementById('fStart').value=toInput(s.start);
  document.getElementById('fEnd').value=toInput(s.end);
  document.getElementById('fNotifOn').checked=s.notif;
  document.getElementById('notifTimeArea').style.display=s.notif?'block':'none';
  document.getElementById('fNotifMin').value=s.notifMin||15;
  populateSelects(s.factoryId,s.personId);
  document.getElementById('scheduleModal').classList.add('open');
}
function closeModal(){document.getElementById('scheduleModal').classList.remove('open');}
function populateSelects(fid,pid){
  document.getElementById('fFactory').innerHTML=factories.map(f=>`<option value="${f.id}" ${f.id===fid?'selected':''}>${f.name}</option>`).join('');
  document.getElementById('fPerson').innerHTML='<option value="">-- 未割当 --</option>'+persons.map(p=>`<option value="${p.id}" ${p.id===pid?'selected':''}>${p.name}</option>`).join('');
}
function toggleNotifTime(){document.getElementById('notifTimeArea').style.display=document.getElementById('fNotifOn').checked?'block':'none';}

function saveSchedule(){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){showToast('⚠ タイトルを入力してください');return;}
  const obj={
    title,
    start:new Date(document.getElementById('fStart').value).toISOString(),
    end:new Date(document.getElementById('fEnd').value).toISOString(),
    factoryId:document.getElementById('fFactory').value,
    personId:document.getElementById('fPerson').value||null,
    note:document.getElementById('fNote').value,
    notif:document.getElementById('fNotifOn').checked,
    notifMin:parseInt(document.getElementById('fNotifMin').value),
  };
  if(editingId){Object.assign(schedules.find(x=>x.id===editingId),obj);showToast('✅ 予定を更新しました');}
  else{schedules.push({id:'s'+Date.now(),...obj});showToast('✅ 予定を追加しました');}
  closeModal();scheduleNotifications();renderSidebar();renderCalendar();
}
function deleteSchedule(){
  if(!editingId)return;
  schedules=schedules.filter(s=>s.id!==editingId);
  closeModal();scheduleNotifications();renderSidebar();renderCalendar();showToast('🗑 予定を削除しました');
}

// ===== NOTIFICATIONS =====
function scheduleNotifications(){
  notifTimers.forEach(t=>clearTimeout(t));notifTimers=[];
  const now=Date.now();
  schedules.filter(s=>s.notif).forEach(s=>{
    const ms=new Date(s.start).getTime()-(s.notifMin*60000);
    const delay=ms-now;
    if(delay>0){notifTimers.push(setTimeout(()=>triggerNotif(s),delay));}
  });
}
function triggerNotif(s){
  const p=persons.find(x=>x.id===s.personId);
  const f=factories.find(x=>x.id===s.factoryId);
  const msg=`${f?.name||'工場不明'} | ${p?.name||'担当者未割当'} — ${s.title}`;
  addNotif('🔔',msg,`${fmtTime(s.start)} 開始 (${s.notifMin}分前)`);
  showToast(`🔔 ${msg}`);
  if('Notification'in window&&Notification.permission==='granted'){
    new Notification('工場スケジュール',{body:`${msg}\n${fmtTime(s.start)} 開始`});
  }
}
function addNotif(icon,text,sub){
  notifications.unshift({id:'n'+Date.now(),icon,text,sub,time:new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})});
  updateBadge();renderNotifPanel();
}
function updateBadge(){const b=document.getElementById('notifBadge');if(notifications.length>0){b.textContent=notifications.length;b.classList.add('show');}else b.classList.remove('show');}
function toggleNotifPanel(){document.getElementById('notifPanel').classList.toggle('open');renderNotifPanel();}
function renderNotifPanel(){
  const list=document.getElementById('notifList');
  list.innerHTML=notifications.length===0?'<div class="notif-empty">通知はありません</div>':
    notifications.map(n=>`<div class="notif-item"><div style="font-size:18px;">${n.icon}</div><div><div>${n.text}</div><div class="notif-time">${n.sub} · ${n.time}</div></div></div>`).join('');
}
function clearNotifs(){notifications=[];updateBadge();renderNotifPanel();}

document.addEventListener('click',e=>{
  const panel=document.getElementById('notifPanel');
  if(panel.classList.contains('open')&&!panel.contains(e.target)&&!document.getElementById('notifBtn').contains(e.target))panel.classList.remove('open');
});

function showToast(msg){
  const c=document.getElementById('toastContainer');
  const t=document.createElement('div');t.className='toast';t.textContent=msg;c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(60px)';t.style.transition='.3s';setTimeout(()=>t.remove(),300);},3500);
}

init();
</script>
