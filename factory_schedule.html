<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工場スケジュール管理</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--border:#30363d;
  --accent:#f0883e;--accent2:#58a6ff;--danger:#f85149;--success:#3fb950;
  --text:#e6edf3;--text-muted:#7d8590;--text-dim:#484f58;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

/* ─── Header ─── */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.logo{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:600;color:var(--accent);}
.logo span{color:var(--text-muted);}
.header-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.notif-badge{background:var(--danger);color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px;display:none;}
.notif-badge.show{display:inline;}

/* ─── Layout ─── */
.app{display:flex;flex:1;overflow:hidden;height:calc(100vh - 57px);}

/* ─── Sidebar ─── */
.sidebar{width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sb-section{padding:13px 14px;border-bottom:1px solid var(--border);}
.sb-title{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;}

/* Factory items */
.factory-item{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:13px;transition:background .14s;border:1px solid transparent;position:relative;}
.factory-item:hover{background:var(--surface2);}
.factory-item:hover .del-btn{opacity:1;}
.factory-item.active{background:rgba(240,136,62,.1);border-color:rgba(240,136,62,.28);}
.fdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.fcount{font-size:10px;background:var(--surface2);color:var(--text-muted);border-radius:8px;padding:1px 6px;font-family:'JetBrains Mono',monospace;}
.del-btn{opacity:0;background:none;border:none;color:var(--danger);cursor:pointer;font-size:12px;padding:2px 4px;border-radius:4px;transition:opacity .14s;flex-shrink:0;}
.del-btn:hover{background:rgba(248,81,73,.15);}

/* Person items */
.person-scroll{flex:1;overflow-y:auto;max-height:200px;}
.person-item{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:13px;transition:background .14s;position:relative;}
.person-item:hover{background:var(--surface2);}
.person-item:hover .del-btn{opacity:1;}
.person-item.selected{background:rgba(88,166,255,.1);}
.avatar{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}

/* type legend */
.type-legend{display:flex;gap:8px;flex-wrap:wrap;}
.type-badge{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-muted);}
.type-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

/* ─── Main ─── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:11px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.view-tabs{display:flex;background:var(--bg);border-radius:6px;padding:3px;gap:2px;}
.view-tab{padding:5px 13px;border-radius:4px;font-size:12px;cursor:pointer;border:none;background:none;color:var(--text-muted);font-family:'Noto Sans JP',sans-serif;}
.view-tab.active{background:var(--surface);color:var(--text);}
.date-nav{display:flex;align-items:center;gap:7px;}
.nav-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:5px;cursor:pointer;font-size:13px;}
.nav-btn:hover{background:var(--border);}
.date-label{font-size:13px;font-weight:500;min-width:155px;text-align:center;}
.toolbar-right{margin-left:auto;display:flex;gap:7px;align-items:center;}

/* Buttons */
.btn{padding:6px 13px;border-radius:6px;font-size:12px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;border:none;font-weight:500;transition:all .14s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#e07528;}
.btn-personal{background:var(--accent2);color:#fff;}
.btn-personal:hover{background:#4090e0;}
.btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);background:var(--surface2);}
.btn-sm{padding:3px 9px;font-size:11px;}
.btn-danger{background:var(--danger);color:#fff;}

/* ─── Calendar ─── */
.calendar-area{flex:1;overflow-y:auto;padding:18px;}

/* Week */
.week-grid{display:grid;grid-template-columns:65px repeat(7,1fr);border:1px solid var(--border);border-radius:8px;overflow:hidden;position:relative;}
.day-header{background:var(--surface);border-left:1px solid var(--border);padding:7px 5px;text-align:center;border-bottom:1px solid var(--border);}
.day-header .dn{font-size:10px;color:var(--text-muted);}
.day-header .dd{font-size:19px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.day-header.today .dd{color:var(--accent);}
.th-corner{background:var(--surface);border-bottom:1px solid var(--border);}
.time-label{background:var(--surface);border-top:1px solid var(--border);padding:3px 5px;font-size:9px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;text-align:right;}
.day-cell{border-left:1px solid var(--border);border-top:1px solid var(--border);min-height:46px;cursor:pointer;}
.day-cell:hover{background:rgba(255,255,255,.015);}
.sch-block{position:absolute;border-radius:4px;padding:2px 5px;font-size:10px;font-weight:500;cursor:pointer;overflow:hidden;border-left:3px solid;z-index:2;transition:transform .1s,box-shadow .1s;}
.sch-block:hover{transform:scale(1.02);box-shadow:0 3px 10px rgba(0,0,0,.4);z-index:10;}
.sch-block .bt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sch-block .bs{font-size:9px;opacity:.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* Month */
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.mday-hdr{background:var(--surface);text-align:center;padding:7px;font-size:10px;color:var(--text-muted);font-weight:600;text-transform:uppercase;}
.mcell{background:var(--surface);min-height:95px;padding:5px;cursor:pointer;transition:background .1s;}
.mcell:hover{background:var(--surface2);}
.mcell.other{opacity:.38;}
.mcell.today{background:rgba(240,136,62,.05);}
.mday-num{font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace;margin-bottom:3px;color:var(--text-muted);}
.mcell.today .mday-num{color:var(--accent);}
.mevent{font-size:10px;padding:2px 4px;border-radius:3px;margin-bottom:2px;cursor:pointer;display:flex;align-items:center;gap:3px;overflow:hidden;}
.mevent-time{font-family:'JetBrains Mono',monospace;font-size:9px;opacity:.9;flex-shrink:0;font-weight:600;}
.mevent-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.mevent-product{font-size:9px;opacity:.68;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px;}
.personal-stripe{background-image:repeating-linear-gradient(-45deg,transparent,transparent 3px,rgba(255,255,255,.05) 3px,rgba(255,255,255,.05) 4px);}

/* Person view */
.pcell{padding:4px;border-right:1px solid var(--border);min-height:60px;cursor:pointer;}
.pcell:hover{background:var(--surface2);}
.plabel{padding:9px 11px;background:var(--surface);border-right:1px solid var(--border);display:flex;align-items:center;gap:7px;}

/* ─── Modal ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .18s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;width:500px;max-width:96vw;max-height:92vh;overflow-y:auto;transform:translateY(12px);transition:transform .18s;}
.modal-overlay.open .modal{transform:translateY(0);}
.mhdr{padding:15px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:5;}
.mhdr-title{font-size:15px;font-weight:600;}
.mhdr-type{font-size:11px;padding:3px 9px;border-radius:10px;font-weight:500;}
.mhdr-type.factory{background:rgba(240,136,62,.15);color:var(--accent);}
.mhdr-type.personal{background:rgba(88,166,255,.15);color:var(--accent2);}
.mclose{background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;}
.mbody{padding:18px;display:flex;flex-direction:column;gap:13px;}
.msec{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:13px;}
.msec-title{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:11px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:11px;color:var(--text-muted);font-weight:500;}
.field input,.field select,.field textarea{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 10px;font-size:13px;font-family:'Noto Sans JP',sans-serif;outline:none;transition:border-color .14s;width:100%;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent2);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;}

/* Color picker */
.color-picker-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px;}
.cpick{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .14s,transform .1s;}
.cpick:hover{transform:scale(1.15);}
.cpick.selected{border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.3);}
.custom-color-wrap{display:flex;align-items:center;gap:6px;margin-top:6px;}
.custom-color-wrap label{font-size:11px;color:var(--text-muted);}
.custom-color-wrap input[type=color]{width:30px;height:26px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:none;padding:1px;}

/* Toggle */
.toggle-row{display:flex;align-items:center;gap:9px;}
.toggle-row span{font-size:13px;flex:1;}
.tsw{position:relative;width:38px;height:20px;flex-shrink:0;}
.tsw input{display:none;}
.tslider{position:absolute;inset:0;background:var(--border);border-radius:10px;cursor:pointer;transition:background .18s;}
.tslider::after{content:'';position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .18s;}
.tsw input:checked + .tslider{background:var(--accent);}
.tsw input:checked + .tslider::after{transform:translateX(18px);}

/* Repeat chips */
.rchips{display:flex;gap:5px;flex-wrap:wrap;}
.rchip{padding:4px 11px;border-radius:16px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);transition:all .13s;font-family:'Noto Sans JP',sans-serif;}
.rchip.active{background:rgba(88,166,255,.14);border-color:var(--accent2);color:var(--accent2);}

/* Weekday */
.wdpicker{display:flex;gap:4px;}
.wdbtn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);cursor:pointer;font-size:11px;font-family:'Noto Sans JP',sans-serif;transition:all .13s;display:flex;align-items:center;justify-content:center;}
.wdbtn.active{background:rgba(88,166,255,.18);border-color:var(--accent2);color:var(--accent2);font-weight:600;}

.mfooter{padding:13px 18px;border-top:1px solid var(--border);display:flex;gap:7px;justify-content:flex-end;position:sticky;bottom:0;background:var(--surface);}

/* Confirm modal */
.cmodal{background:var(--surface);border:1px solid var(--border);border-radius:10px;width:360px;max-width:95vw;}
.cbody{padding:22px 18px;text-align:center;}
.cicon{font-size:34px;margin-bottom:10px;}
.ctitle{font-size:15px;font-weight:600;margin-bottom:7px;}
.cdesc{font-size:12px;color:var(--text-muted);line-height:1.6;}
.cfooter{padding:13px 18px;border-top:1px solid var(--border);display:flex;gap:7px;justify-content:center;}

/* Notif panel */
.np{position:fixed;top:57px;right:0;width:330px;background:var(--surface);border:1px solid var(--border);border-radius:0 0 0 9px;z-index:200;transform:translateX(100%);transition:transform .22s;max-height:68vh;overflow-y:auto;}
.np.open{transform:translateX(0);}
.np-hdr{padding:13px 15px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between;}
.np-item{padding:11px 15px;border-bottom:1px solid var(--border);font-size:12px;display:flex;gap:9px;}
.np-time{font-size:10px;color:var(--text-muted);margin-top:3px;}
.np-empty{padding:22px;text-align:center;color:var(--text-muted);font-size:12px;}

/* Toast */
.toast-wrap{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:7px;z-index:2000;}
.toast{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:7px;padding:11px 14px;font-size:12px;max-width:290px;box-shadow:0 7px 22px rgba(0,0,0,.5);animation:si .28s ease;}
@keyframes si{from{transform:translateX(55px);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* Add row */
.add-row{display:flex;gap:5px;margin-top:9px;}
.add-row input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:5px 7px;font-size:11px;font-family:'Noto Sans JP',sans-serif;outline:none;}
.add-row input:focus{border-color:var(--accent2);}
.add-row select{background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:5px 6px;font-size:11px;font-family:'Noto Sans JP',sans-serif;outline:none;}

.empty-state{text-align:center;color:var(--text-muted);font-size:13px;padding:55px 35px;}
.empty-state .ei{font-size:34px;margin-bottom:11px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
select option{background:#1c2128;}
</style>
</head>
<body>

<header>
  <div class="logo">🏭 <span>//</span> 工場スケジュール</div>
  <div class="header-right">
    <button class="btn btn-ghost" id="notifBtn" onclick="toggleNP()" style="position:relative;font-size:12px;">
      🔔 通知 <span class="notif-badge" id="notifBadge">0</span>
    </button>
    <button class="btn btn-personal" onclick="openPersonalModal()">👤 個人予定 追加</button>
    <button class="btn btn-primary" onclick="openFactoryModal()">🏭 工場予定 追加</button>
  </div>
</header>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <!-- Factories -->
    <div class="sb-section">
      <div class="sb-title">工場 <span style="font-size:9px;color:var(--text-dim);font-weight:400;letter-spacing:0;">ホバーで削除</span></div>
      <div id="factoryList" style="display:flex;flex-direction:column;gap:2px;"></div>
      <div class="add-row">
        <input id="newFName" placeholder="工場名" onkeydown="if(event.key==='Enter')addFactory()">
        <button class="btn btn-ghost btn-sm" onclick="addFactory()">＋</button>
      </div>
    </div>

    <!-- Persons -->
    <div class="sb-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
      <div class="sb-title">担当者 <span id="filterLabel" style="color:var(--accent2);font-size:9px;font-weight:400;letter-spacing:0;"></span></div>
      <div class="person-scroll" id="personList"></div>
      <div class="add-row" style="flex-wrap:wrap;gap:4px;">
        <input id="newPName" placeholder="氏名" style="min-width:70px;" onkeydown="if(event.key==='Enter')addPerson()">
        <input id="newPRole" placeholder="役職" style="min-width:55px;" onkeydown="if(event.key==='Enter')addPerson()">
        <select id="newPFactory" style="min-width:70px;"></select>
        <button class="btn btn-ghost btn-sm" onclick="addPerson()">＋</button>
      </div>
      <div style="margin-top:5px;font-size:10px;color:var(--text-dim);">※ 役職を入力して担当者を追加できます</div>
    </div>

    <!-- Legend -->
    <div class="sb-section">
      <div class="type-legend">
        <div class="type-badge"><div class="type-dot" style="background:var(--accent);"></div>工場予定</div>
        <div class="type-badge" style="background-image:repeating-linear-gradient(-45deg,transparent,transparent 2px,rgba(255,255,255,.08) 2px,rgba(255,255,255,.08) 3px);border-radius:2px;padding:1px 3px;">
          <div class="type-dot" style="background:var(--accent2);"></div>個人予定
        </div>
      </div>
      <div id="factoryLegend" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;"></div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="toolbar">
      <div class="view-tabs">
        <button class="view-tab active" onclick="setView('week',this)">週</button>
        <button class="view-tab" onclick="setView('month',this)">月</button>
        <button class="view-tab" onclick="setView('person',this)">人別</button>
      </div>
      <div class="date-nav">
        <button class="nav-btn" onclick="navigate(-1)">‹</button>
        <div class="date-label" id="dateLabel"></div>
        <button class="nav-btn" onclick="navigate(1)">›</button>
        <button class="nav-btn" onclick="goToday()" style="font-size:11px;">今日</button>
      </div>
      <div class="toolbar-right">
        <span id="filterInfo" style="font-size:11px;color:var(--text-muted);"></span>
      </div>
    </div>
    <div class="calendar-area" id="calendarArea"></div>
  </div>
</div>

<!-- Notif panel -->
<div class="np" id="np">
  <div class="np-hdr">通知ログ <button class="btn btn-ghost btn-sm" onclick="clearNotifs()">全消去</button></div>
  <div id="npList"></div>
</div>
<div class="toast-wrap" id="toastWrap"></div>

<!-- ═══ FACTORY Modal ═══ -->
<div class="modal-overlay" id="factoryModal">
  <div class="modal">
    <div class="mhdr">
      <div style="display:flex;align-items:center;gap:9px;">
        <div class="mhdr-title" id="fmTitle">工場予定を追加</div>
        <div class="mhdr-type factory">🏭 工場予定</div>
      </div>
      <button class="mclose" onclick="closeFM()">×</button>
    </div>
    <div class="mbody">
      <div class="msec">
        <div class="msec-title">📋 基本情報</div>
        <div style="display:flex;flex-direction:column;gap:11px;">
          <div class="field">
            <label>タイトル・製造商品 *</label>
            <input id="fm_title" placeholder="例：生産ライン稼働 / 自動車ドアパネル">
            <div style="font-size:10px;color:var(--text-dim);margin-top:3px;">タイトルと製造商品を「 / 」や「　」で区切って入力できます</div>
          </div>
          <div class="field"><label>工場 *</label><select id="fm_factory"></select></div>
          <div class="field"><label>担当者</label><select id="fm_person"></select></div>
        </div>
      </div>
      <div class="msec">
        <div class="msec-title">🗓 日付</div>
        <div class="field-row">
          <div class="field"><label>開始日</label><input id="fm_start" type="date"></div>
          <div class="field"><label>終了日</label><input id="fm_end" type="date"></div>
        </div>
      </div>
      <div class="msec">
        <div class="msec-title">🏗 製造日・🚚 発送日</div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:10px;">発送日はカレンダー上で別色（紫）で表示されます</div>
        <div class="field-row">
          <div class="field"><label>🏗 製造日</label><input id="fm_mfg_date" type="date"></div>
          <div class="field">
            <label>🚚 発送日</label>
            <input id="fm_ship_date" type="date">
            <div style="display:flex;align-items:center;gap:6px;margin-top:6px;">
              <label style="font-size:11px;color:var(--text-muted);">発送日の色：</label>
              <input type="color" id="fm_ship_color" value="#bc8cff" style="width:28px;height:22px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:none;padding:1px;">
            </div>
          </div>
        </div>
      </div>
      <div class="msec">
        <div class="msec-title">🎨 色設定</div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;">工場の既定色またはカスタム色を選択</div>
        <div class="color-picker-row" id="fm_colorRow"></div>
        <div class="custom-color-wrap">
          <label>カスタム色：</label>
          <input type="color" id="fm_customColor" value="#f0883e" oninput="onFMCustomColor()">
        </div>
      </div>

<script>
// ══════════════════════════════
// DATA
// ══════════════════════════════
const PRESET_COLORS=['#f0883e','#58a6ff','#3fb950','#d29922','#bc8cff','#f85149','#39c5cf','#f778ba','#ff9999','#aaddff'];

let factories=[
  {id:'f1',name:'第1工場',color:'#f0883e'},
  {id:'f2',name:'第2工場',color:'#58a6ff'},
  {id:'f3',name:'第3工場',color:'#3fb950'},
];
let persons=[
  {id:'p1',name:'田中 太郎',factoryId:'f1',role:'ライン長'},
  {id:'p2',name:'山田 花子',factoryId:'f1',role:'オペレーター'},
  {id:'p3',name:'鈴木 一郎',factoryId:'f2',role:'ライン長'},
  {id:'p4',name:'佐藤 次郎',factoryId:'f2',role:'オペレーター'},
  {id:'p5',name:'高橋 美咲',factoryId:'f3',role:'ライン長'},
];
// type: 'factory' | 'personal'
let schedules=[
  {id:'s1',type:'factory',title:'朝礼・点検',product:'',start:todayAt(8,0),end:todayAt(8,30),factoryId:'f1',personId:'p1',color:null,mfgDate:'',shipDate:'',shipColor:'#bc8cff',repeatId:null,notif:false,notifMin:15,note:''},
  {id:'s2',type:'factory',title:'生産ライン稼働 / 自動車ドアパネル',product:'',start:todayAt(9,0),end:todayAt(12,0),factoryId:'f1',personId:'p2',color:null,mfgDate:todayDateStr(),shipDate:tomorrowDateStr(),shipColor:'#bc8cff',repeatId:null,notif:false,notifMin:15,note:''},
  {id:'s3',type:'factory',title:'安全講習',product:'',start:todayAt(14,0),end:todayAt(16,0),factoryId:'f2',personId:'p3',color:null,mfgDate:'',shipDate:'',shipColor:'#bc8cff',repeatId:null,notif:false,notifMin:15,note:'全員参加'},
  {id:'s4',type:'personal',title:'月次ミーティング',product:'',start:todayAt(10,0),end:todayAt(11,0),factoryId:null,personId:'p1',color:'#58a6ff',mfgDate:'',shipDate:'',shipColor:'#bc8cff',repeatId:null,notif:true,notifMin:15,note:'資料持参'},
];
let repeatSeries=[];
let notifications=[];
let notifTimers=[];

// UI state
let currentView='week';
let currentDate=new Date();
let selectedFactoryId=null;
let selectedPersonIds=[];
let editingFMId=null;
let editingPMId=null;
let pendingConfirmFn=null;
let fmColor=null; // null = use factory color
let pmColor='#58a6ff';
let rType='daily';
let rWeekdays=[];

// ══════════════════════════════
// UTILS
// ══════════════════════════════
function todayAt(h,m){const d=new Date();d.setHours(h,m,0,0);return d.toISOString();}
function tomorrowAt(h,m){const d=new Date();d.setDate(d.getDate()+1);d.setHours(h,m,0,0);return d.toISOString();}
function todayDateStr(){const d=new Date();return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function tomorrowDateStr(){const d=new Date();d.setDate(d.getDate()+1);return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function toDateStr(iso){if(!iso)return'';const d=new Date(iso);return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function dateStrToISO(s){if(!s)return'';return new Date(s+'T00:00:00').toISOString();}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function pad(n){return String(n).padStart(2,'0');}
function toInput(iso){const d=new Date(iso);return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function dtStr(date,h,m){const d=new Date(date);d.setHours(h,m,0,0);return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(h)}:${pad(m)}`;}
function fmtT(iso){const d=new Date(iso);return`${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function dOnly(d){const r=new Date(d);r.setHours(0,0,0,0);return r;}
function getColor(s){
  if(s._kind==='ship')return s.shipColor||'#bc8cff';
  if(s._kind==='mfg'){const fc=factories.find(f=>f.id===s.factoryId);return s.color||(fc?.color||'#f0883e');}
  if(s.type==='factory'){return s.color||(factories.find(f=>f.id===s.factoryId)?.color||'#f0883e');}
  return s.color||'#58a6ff';
}

function init(){
  if('Notification'in window&&Notification.permission==='default')Notification.requestPermission();
  renderSidebar();renderCalendar();scheduleNotifs();
  setTimeout(()=>addNotif('🔔','田中 太郎 — 月次ミーティング','10:00 開始 (デモ通知)'),1500);
}

// ══════════════════════════════
// CONFIRM
// ══════════════════════════════
function showConfirm(icon,title,desc,fn){
  pendingConfirmFn=fn;
  document.getElementById('cIcon').textContent=icon;
  document.getElementById('cTitle').textContent=title;
  document.getElementById('cDesc').textContent=desc;
  document.getElementById('confirmModal').classList.add('open');
}
function closeConfirm(){document.getElementById('confirmModal').classList.remove('open');pendingConfirmFn=null;}
function doConfirm(){if(pendingConfirmFn)pendingConfirmFn();closeConfirm();}

// ══════════════════════════════
// FACTORY management
// ══════════════════════════════
function addFactory(){
  const n=document.getElementById('newFName').value.trim();if(!n)return;
  const color=PRESET_COLORS[factories.length%PRESET_COLORS.length];
  factories.push({id:'f'+Date.now(),name:n,color});
  document.getElementById('newFName').value='';
  renderSidebar();renderCalendar();showToast('🏭 '+n+' を追加しました');
}
function confirmDelFactory(id,e){
  e.stopPropagation();
  const f=factories.find(x=>x.id===id);if(!f)return;
  const pc=persons.filter(p=>p.factoryId===id).length;
  const sc=schedules.filter(s=>s.factoryId===id).length;
  showConfirm('🏭','「'+f.name+'」を削除しますか？',`担当者 ${pc}名・予定 ${sc}件も削除されます。`,()=>{
    factories=factories.filter(x=>x.id!==id);
    persons=persons.filter(p=>p.factoryId!==id);
    schedules=schedules.filter(s=>s.factoryId!==id||s.type==='personal');
    if(selectedFactoryId===id){selectedFactoryId=null;selectedPersonIds=[];}
    renderSidebar();renderCalendar();showToast('🗑 '+f.name+' を削除しました');
  });
}
function selectFactory(id){selectedFactoryId=id;selectedPersonIds=[];renderSidebar();renderCalendar();}

// ══════════════════════════════
// PERSON management
// ══════════════════════════════
function addPerson(){
  const name=document.getElementById('newPName').value.trim();if(!name)return;
  const role=document.getElementById('newPRole').value.trim()||'スタッフ';
  const fId=document.getElementById('newPFactory').value||factories[0]?.id;
  if(!fId){showToast('⚠ 先に工場を追加してください');return;}
  persons.push({id:'p'+Date.now(),name,factoryId:fId,role});
  document.getElementById('newPName').value='';
  document.getElementById('newPRole').value='';
  renderSidebar();renderCalendar();
  showToast('👤 '+name+'（'+role+'）を追加しました');
}
function confirmDelPerson(id,e){
  e.stopPropagation();
  const p=persons.find(x=>x.id===id);if(!p)return;
  const sc=schedules.filter(s=>s.personId===id).length;
  showConfirm('👤','「'+p.name+'」を削除しますか？',`この担当者の予定 ${sc}件も削除されます。`,()=>{
    persons=persons.filter(x=>x.id!==id);
    schedules=schedules.filter(s=>s.personId!==id);
    selectedPersonIds=selectedPersonIds.filter(x=>x!==id);
    renderSidebar();renderCalendar();showToast('🗑 '+p.name+' を削除しました');
  });
}
function togglePerson(id){const i=selectedPersonIds.indexOf(id);if(i===-1)selectedPersonIds.push(id);else selectedPersonIds.splice(i,1);renderSidebar();renderCalendar();}

// ══════════════════════════════
// SIDEBAR RENDER
// ══════════════════════════════
function renderSidebar(){
  // Factories
  document.getElementById('factoryList').innerHTML=
    `<div class="factory-item ${!selectedFactoryId?'active':''}" onclick="selectFactory(null)">
      <div class="fdot" style="background:#7d8590;"></div>
      <span style="flex:1;">全工場</span>
      <span class="fcount">${schedules.length}</span>
    </div>`+
    factories.map(f=>`
      <div class="factory-item ${selectedFactoryId===f.id?'active':''}" onclick="selectFactory('${f.id}')">
        <div class="fdot" style="background:${f.color};"></div>
        <span style="flex:1;">${f.name}</span>
        <span class="fcount">${schedules.filter(s=>s.factoryId===f.id).length}</span>
        <button class="del-btn" onclick="confirmDelFactory('${f.id}',event)">✕</button>
      </div>`).join('');

  // Persons
  const fp=selectedFactoryId?persons.filter(p=>p.factoryId===selectedFactoryId):persons;
  document.getElementById('filterLabel').textContent=selectedFactoryId?`（${factories.find(f=>f.id===selectedFactoryId)?.name}）`:'';
  document.getElementById('personList').innerHTML=fp.length===0
    ?'<div style="padding:7px 8px;color:var(--text-dim);font-size:11px;">担当者がいません</div>'
    :fp.map(p=>{
      const fc=factories.find(f=>f.id===p.factoryId);
      const sel=selectedPersonIds.includes(p.id);
      const ini=p.name.replace(/\s/g,'').slice(0,2);
      return`<div class="person-item ${sel?'selected':''}" onclick="togglePerson('${p.id}')">
        <div class="avatar" style="background:${fc?.color||'#888'}20;color:${fc?.color||'#888'};">${ini}</div>
        <div style="flex:1;overflow:hidden;">
          <div style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</div>
          <div style="font-size:10px;color:var(--text-muted);">${p.role}${!selectedFactoryId?' · '+fc?.name:''}</div>
        </div>
        ${sel?'<span style="color:var(--accent2);font-size:12px;">✓</span>':''}
        <button class="del-btn" onclick="confirmDelPerson('${p.id}',event)">✕</button>
      </div>`;
    }).join('');

  // Factory select in add-person row
  document.getElementById('newPFactory').innerHTML=factories.map(f=>`<option value="${f.id}">${f.name}</option>`).join('');
  if(selectedFactoryId)document.getElementById('newPFactory').value=selectedFactoryId;

  // Legend
  document.getElementById('factoryLegend').innerHTML=factories.map(f=>
    `<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-muted);">
      <div style="width:7px;height:7px;border-radius:2px;background:${f.color};"></div>${f.name}</div>`
  ).join('');
  document.getElementById('filterInfo').textContent=selectedPersonIds.length>0?`${selectedPersonIds.length}名選択中`:'';
}

// ══════════════════════════════
// VIEW
// ══════════════════════════════
function setView(v,el){currentView=v;document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderCalendar();}
function navigate(d){
  if(currentView==='month')currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()+d,1);
  else currentDate=addDays(currentDate,7*d);
  renderCalendar();
}
function goToday(){currentDate=new Date();renderCalendar();}
function getWeekStart(d){const r=new Date(d);const dow=(r.getDay()+6)%7;r.setDate(r.getDate()-dow);r.setHours(0,0,0,0);return r;}

function filteredBase(){
  let s=schedules;
  if(selectedFactoryId)s=s.filter(x=>x.factoryId===selectedFactoryId||x.type==='personal');
  if(selectedPersonIds.length>0)s=s.filter(x=>selectedPersonIds.includes(x.personId));
  return s;
}

function getVisible(start,end){
  const rs=dOnly(start).getTime(),re=dOnly(end).getTime();
  const result=[];
  filteredBase().forEach(s=>{
    if(!s.repeatId){
      const sd=dOnly(new Date(s.start)).getTime();
      if(sd>=rs&&sd<=re)result.push(s);
      // 工場予定の製造日を仮想エントリとして追加
      if(s.type==='factory'&&s.mfgDate){
        const md=dOnly(new Date(s.mfgDate+'T00:00:00')).getTime();
        if(md>=rs&&md<=re){
          result.push({...s,id:s.id+'_mfg',_baseId:s.id,_kind:'mfg',
            start:s.mfgDate+'T00:00:00',end:s.mfgDate+'T00:00:00',
            title:'🏗 '+s.title,color:getColor(s)});
        }
      }
      // 工場予定の発送日を仮想エントリとして追加
      if(s.type==='factory'&&s.shipDate){
        const shd=dOnly(new Date(s.shipDate+'T00:00:00')).getTime();
        if(shd>=rs&&shd<=re){
          result.push({...s,id:s.id+'_ship',_baseId:s.id,_kind:'ship',
            start:s.shipDate+'T00:00:00',end:s.shipDate+'T00:00:00',
            title:'🚚 '+s.title,color:s.shipColor||'#bc8cff'});
        }
      }
    } else {
      const series=repeatSeries.find(r=>r.id===s.repeatId);
      if(series)result.push(...expandSeries(s,series,start,end));
    }
  });
  return result;
}

function expandSeries(base,series,rStart,rEnd){
  const instances=[];
  const dur=new Date(base.end).getTime()-new Date(base.start).getTime();
  const bs=new Date(base.start);
  let cursor=new Date(bs);
  let count=0;
  for(let iter=0;iter<500;iter++){
    if(series.endMode==='count'&&count>=series.endCount)break;
    if(series.endMode==='date'&&dOnly(cursor).getTime()>dOnly(new Date(series.endDate)).getTime())break;
    let dates=[];
    if((series.type==='weekly'||series.type==='custom')&&series.weekdays&&series.weekdays.length>0){
      const ws=new Date(cursor);ws.setDate(ws.getDate()-((ws.getDay()+6)%7));
      for(let i=0;i<7;i++){const wd=addDays(ws,i);if(series.weekdays.includes(wd.getDay()))dates.push(wd);}
    } else dates=[cursor];
    for(const dt of dates){
      if(series.endMode==='count'&&count>=series.endCount)break;
      if(series.endMode==='date'&&dOnly(dt).getTime()>dOnly(new Date(series.endDate)).getTime())break;
      const dtMs=dOnly(dt).getTime();
      if(dtMs>=dOnly(rStart).getTime()&&dtMs<=dOnly(rEnd).getTime()){
        const ns=new Date(dt);ns.setHours(bs.getHours(),bs.getMinutes(),0,0);
        const ne=new Date(ns.getTime()+dur);
        instances.push({...base,id:base.id+'_'+dtMs,_bid:base.id,start:ns.toISOString(),end:ne.toISOString()});
      }
      count++;
    }
    if((series.type==='weekly'||series.type==='custom')&&series.weekdays&&series.weekdays.length>0){
      cursor.setDate(cursor.getDate()+7*(series.interval||1));
    } else {
      const c2=new Date(cursor);
      if(series.type==='daily')c2.setDate(c2.getDate()+(series.interval||1));
      else if(series.type==='weekly')c2.setDate(c2.getDate()+7*(series.interval||1));
      else if(series.type==='monthly')c2.setMonth(c2.getMonth()+(series.interval||1));
      else if(series.type==='yearly')c2.setFullYear(c2.getFullYear()+(series.interval||1));
      else if(series.type==='custom'){
        if(series.unit==='day')c2.setDate(c2.getDate()+(series.interval||1));
        else if(series.unit==='week')c2.setDate(c2.getDate()+7*(series.interval||1));
        else if(series.unit==='month')c2.setMonth(c2.getMonth()+(series.interval||1));
      }
      cursor=c2;
    }
  }
  return instances;
}

function renderCalendar(){
  const a=document.getElementById('calendarArea');
  if(currentView==='week')renderWeek(a);
  else if(currentView==='month')renderMonth(a);
  else renderPerson(a);
}

// ══════════════════════════════
// WEEK VIEW
// ══════════════════════════════
function renderWeek(area){
  const ws=getWeekStart(currentDate);
  const days=Array.from({length:7},(_,i)=>addDays(ws,i));
  const todayD=dOnly(new Date());
  const DN=['月','火','水','木','金','土','日'];
  document.getElementById('dateLabel').textContent=`${ws.getFullYear()}年${ws.getMonth()+1}月${ws.getDate()}日〜`;
  const hours=Array.from({length:17},(_,i)=>i+7);

  // allday bar (製造日・発送日)
  const vis=getVisible(ws,addDays(ws,6));
  const alldayItems=vis.filter(s=>s._kind==='mfg'||s._kind==='ship');
  const hasAllday=alldayItems.length>0;

  let html=`<div class="week-grid" id="wg">`;
  // corner
  html+=`<div class="th-corner" style="${hasAllday?'grid-row:span 2;':''}"></div>`;
  days.forEach((d,i)=>{
    const isT=dOnly(d).getTime()===todayD.getTime();
    html+=`<div class="day-header ${isT?'today':''}"><div class="dn">${DN[i]}</div><div class="dd">${d.getDate()}</div></div>`;
  });

  // allday row
  if(hasAllday){
    html+=`<div style="background:var(--surface);border-top:1px solid var(--border);border-right:1px solid var(--border);padding:3px 4px;font-size:9px;color:var(--text-muted);display:flex;align-items:center;">終日</div>`;
    days.forEach(d=>{
      const dayItems=alldayItems.filter(s=>dOnly(new Date(s.start)).getTime()===dOnly(d).getTime());
      html+=`<div style="border-left:1px solid var(--border);border-top:1px solid var(--border);padding:2px;min-height:24px;background:var(--surface2);">`;
      dayItems.forEach(s=>{
        const c=getColor(s);
        const bid=s._baseId||s.id;
        html+=`<div onclick="openFMEdit('${bid}')" style="font-size:9px;padding:1px 4px;border-radius:3px;background:${c}30;color:${c};border-left:2px solid ${c};margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;">${s.title}</div>`;
      });
      html+=`</div>`;
    });
  }

  hours.forEach(h=>{
    html+=`<div class="time-label">${pad(h)}:00</div>`;
    days.forEach(d=>{html+=`<div class="day-cell" onclick="openFMAt('${dtStr(d,h,0)}')"></div>`;});
  });
  html+=`</div>`;area.innerHTML=html;

  // Overlay time-based blocks (通常予定・個人予定のみ)
  const grid=document.getElementById('wg');
  vis.filter(s=>!s._kind).forEach(s=>{
    const sd=new Date(s.start),ed=new Date(s.end);
    const di=days.findIndex(d=>dOnly(d).getTime()===dOnly(sd).getTime());
    if(di===-1)return;
    const sh=sd.getHours()+sd.getMinutes()/60;
    const eh=Math.max(ed.getHours()+ed.getMinutes()/60, sh+0.5);
    const alldayOffset=hasAllday?24:0;
    const top=(sh-7)*46+34+alldayOffset;
    const ht=Math.max((eh-sh)*46,16);
    const c=getColor(s);
    const isPersonal=s.type==='personal';
    const b=document.createElement('div');
    b.className='sch-block'+(isPersonal?' personal-stripe':'');
    b.style.cssText=`top:${top}px;height:${ht}px;left:calc(${(di+1)/8*100}% + 2px);width:calc(${1/8*100}% - 5px);background:${c}24;border-color:${c};color:${c};`;
    const p=persons.find(x=>x.id===s.personId);
    // 工場予定は時刻非表示
    let inner=`<div class="bt">${s.repeatId?'↻ ':''}`+(isPersonal?'👤 ':'')+`${s.title}</div>`;
    if(p)inner+=`<div class="bs">${p.name}</div>`;
    b.innerHTML=inner;
    const bid=s._baseId||s.id;
    b.onclick=(e)=>{e.stopPropagation();isPersonal?openPMEdit(bid):openFMEdit(bid);};
    grid.appendChild(b);
  });
}

// ══════════════════════════════
// MONTH VIEW
// ══════════════════════════════
function renderMonth(area){
  const y=currentDate.getFullYear(),m=currentDate.getMonth();
  document.getElementById('dateLabel').textContent=`${y}年${m+1}月`;
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const startDow=(first.getDay()+6)%7;
  const todayD=dOnly(new Date());
  const DN=['月','火','水','木','金','土','日'];
  let cells=[];
  for(let i=0;i<startDow;i++)cells.push({date:addDays(first,i-startDow),other:true});
  for(let d=1;d<=last.getDate();d++)cells.push({date:new Date(y,m,d),other:false});
  while(cells.length%7!==0)cells.push({date:addDays(last,cells.length-startDow-last.getDate()+1),other:true});
  const vis=getVisible(new Date(y,m,1),new Date(y,m+1,0));
  let html=`<div class="month-grid">`;
  DN.forEach(d=>html+=`<div class="mday-hdr">${d}</div>`);
  cells.forEach(cell=>{
    const isT=dOnly(cell.date).getTime()===todayD.getTime();
    const ds=vis.filter(s=>dOnly(new Date(s.start)).getTime()===dOnly(cell.date).getTime());
    const ds2=dtStr(cell.date,9,0);
    html+=`<div class="mcell ${cell.other?'other':''} ${isT?'today':''}" onclick="openFMAt('${ds2}')">
      <div class="mday-num">${cell.date.getDate()}</div>
      ${ds.slice(0,4).map(s=>{
        const c=getColor(s);
        const isP=s.type==='personal';
        const isShip=s._kind==='ship';
        const isMfg=s._kind==='mfg';
        const bid=s._baseId||s._bid||s.id;
        const openFn=isP?'openPMEdit':'openFMEdit';
        // 工場予定（製造日・発送日含む）は時刻なし・終日スタイル
        const showTime=isP&&!isShip&&!isMfg;
        return`<div class="mevent ${isP&&!isShip&&!isMfg?'personal-stripe':''}" style="background:${c}${isShip?'33':'22'};color:${c};${isShip?'border-left:2px solid '+c+';':''}" onclick="event.stopPropagation();${openFn}('${bid}')">
          ${showTime?`<span class="mevent-time">${fmtT(s.start)}</span>`:''}
          ${s.repeatId&&!isShip&&!isMfg?'<span style="font-size:8px;opacity:.65;">↻</span>':''}
          ${isP&&!isShip&&!isMfg?'<span style="font-size:9px;">👤</span>':''}
          <span class="mevent-title">${s.title}</span>
        </div>`;
      }).join('')}
      ${ds.length>4?`<div style="font-size:9px;color:var(--text-muted);padding:1px 3px;">+${ds.length-4}件</div>`:''}
    </div>`;
  });
  html+=`</div>`;area.innerHTML=html;
}

// PERSON VIEW
// ══════════════════════════════
function renderPerson(area){
  const ws=getWeekStart(currentDate);
  const days=Array.from({length:7},(_,i)=>addDays(ws,i));
  const todayD=dOnly(new Date());
  const DN=['月','火','水','木','金','土','日'];
  document.getElementById('dateLabel').textContent=`${ws.getFullYear()}年${ws.getMonth()+1}月${ws.getDate()}日〜`;
  const fp=selectedPersonIds.length>0?persons.filter(p=>selectedPersonIds.includes(p.id)):
    (selectedFactoryId?persons.filter(p=>p.factoryId===selectedFactoryId):persons);
  if(fp.length===0){area.innerHTML='<div class="empty-state"><div class="ei">👤</div>左サイドバーから担当者を選択してください</div>';return;}
  const vis=getVisible(ws,addDays(ws,6));
  const cols=`170px repeat(7,1fr)`;
  let html=`<div>
    <div style="display:grid;grid-template-columns:${cols};position:sticky;top:0;z-index:10;background:var(--surface);border-bottom:1px solid var(--border);">
      <div style="padding:7px 11px;border-right:1px solid var(--border);font-size:10px;color:var(--text-muted);">担当者</div>
      ${days.map((d,i)=>{const isT=dOnly(d).getTime()===todayD.getTime();return`<div style="text-align:center;padding:7px 3px;border-right:1px solid var(--border);"><div style="font-size:9px;color:var(--text-muted);">${DN[i]}</div><div style="font-size:15px;font-weight:700;font-family:'JetBrains Mono',monospace;${isT?'color:var(--accent)':''}">${d.getDate()}</div></div>`;}).join('')}
    </div>`;
  fp.forEach(p=>{
    const fc=factories.find(f=>f.id===p.factoryId);
    const c=fc?.color||'#888';
    const ini=p.name.replace(/\s/g,'').slice(0,2);
    html+=`<div style="display:grid;grid-template-columns:${cols};border-bottom:1px solid var(--border);">
      <div class="plabel">
        <div class="avatar" style="background:${c}20;color:${c};">${ini}</div>
        <div>
          <div style="font-size:12px;font-weight:500;">${p.name}</div>
          <div style="font-size:10px;color:var(--text-muted);">${p.role}</div>
        </div>
      </div>
      ${days.map(d=>{
        const ds=vis.filter(s=>s.personId===p.id&&dOnly(new Date(s.start)).getTime()===dOnly(d).getTime());
        return`<div class="pcell" onclick="openFMAt('${dtStr(d,9,0)}')">
          ${ds.map(s=>{const c2=getColor(s);const isP=s.type==='personal';const bid=s._baseId||s._bid||s.id;return`<div class="mevent ${isP?'personal-stripe':''}" style="background:${c2}26;color:${c2};" onclick="event.stopPropagation();${isP?'openPMEdit':'openFMEdit'}('${bid}')">
            <span class="mevent-time">${fmtT(s.start)}</span>
            ${isP?'<span style="font-size:9px;">👤</span>':''}
            <span class="mevent-title">${s.title}</span>
          </div>`;}).join('')}
        </div>`;
      }).join('')}
    </div>`;
  });
  html+=`</div>`;area.innerHTML=html;
}

// 📋 工場予定を複写
function copyFM(){
  const src=schedules.find(x=>x.id===editingFMId);if(!src)return;
  closeFM();
  setTimeout(()=>{
    openFactoryModal();
    document.getElementById('fm_title').value=src.title;

function populateFMSelects(fid,pid){
  document.getElementById('fm_factory').innerHTML=factories.map(f=>`<option value="${f.id}" ${f.id===fid?'selected':''}>${f.name}</option>`).join('');
  document.getElementById('fm_person').innerHTML='<option value="">-- 未割当 --</option>'+persons.map(p=>`<option value="${p.id}" ${p.id===pid?'selected':''}>${p.name}（${p.role}）</option>`).join('');
}

function buildFMColorPicker(selectedColor){
  fmColor=selectedColor;
  const row=document.getElementById('fm_colorRow');
  row.innerHTML=`<div class="cpick ${!selectedColor?'selected':''}" style="background:var(--text-dim);position:relative;overflow:hidden;" onclick="pickFMColor(null,this)" title="工場の既定色"><span style="font-size:9px;color:#fff;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">自動</span></div>`+
    PRESET_COLORS.map(c=>
      `<div class="cpick ${c===selectedColor?'selected':''}" style="background:${c};" onclick="pickFMColor('${c}',this)"></div>`
    ).join('');
  if(selectedColor)document.getElementById('fm_customColor').value=selectedColor;
}
function pickFMColor(color,el){
  fmColor=color;
  document.querySelectorAll('#fm_colorRow .cpick').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');

}

function saveFM(){
  const title=document.getElementById('fm_title').value.trim();
  if(!title){showToast('⚠ タイトルを入力してください');return;}
  const startVal=document.getElementById('fm_start').value;
  const endVal=document.getElementById('fm_end').value;
  if(!startVal){showToast('⚠ 開始日を入力してください');return;}
  const obj={
    type:'factory',title,
    product:'',
    start:dateStrToISO(startVal),
    end:dateStrToISO(endVal||startVal),
    factoryId:document.getElementById('fm_factory').value,
    personId:document.getElementById('fm_person').value||null,
    color:fmColor,
    mfgDate:document.getElementById('fm_mfg_date').value||'',
    shipDate:document.getElementById('fm_ship_date').value||'',
    shipColor:document.getElementById('fm_ship_color').value||'#bc8cff',
    repeatId:null,notif:false,notifMin:15,note:'',
  };
  if(editingFMId){Object.assign(schedules.find(x=>x.id===editingFMId),obj);showToast('✅ 工場予定を更新しました');}
  else{schedules.push({id:'s'+Date.now(),...obj});showToast('✅ 工場予定を追加しました');}
  closeFM();renderSidebar();renderCalendar();
}
function deleteFM(){
  if(!editingFMId)return;
  schedules=schedules.filter(x=>x.id!==editingFMId);
  closeFM();renderSidebar();renderCalendar();showToast('🗑 工場予定を削除しました');
}

function onPMCustomColor(){
  pmColor=document.getElementById('pm_customColor').value;
  document.querySelectorAll('#pm_colorRow .cpick').forEach(e=>e.classList.remove('selected'));
}

function toggleRepeatUI(){document.getElementById('repeatUI').style.display=document.getElementById('pm_repeatOn').checked?'flex':'none';}
function setRT(t,el){rType=t;document.querySelectorAll('.rchip').forEach(c=>c.classList.remove('active'));el.classList.add('active');updateRTypeUI(t);}
function updateRTypeUI(t){
  document.getElementById('wdArea').style.display=(t==='weekly'||t==='custom')?'block':'none';
  document.getElementById('custArea').style.display=t==='custom'?'block':'none';
}
function toggleWD(d,btn){const i=rWeekdays.indexOf(d);if(i===-1)rWeekdays.push(d);else rWeekdays.splice(i,1);btn.classList.toggle('active',rWeekdays.includes(d));}
function toggleREnd(){
  const isDate=document.getElementById('rEndD').checked;
  document.getElementById('pm_renddate').disabled=!isDate;
  document.getElementById('pm_rcnt').disabled=isDate;
}
function toggleNotifUI(){document.getElementById('notifUI').style.display=document.getElementById('pm_notifOn').checked?'block':'none';}
function typeLabel(t){return{daily:'毎日',weekly:'毎週',monthly:'毎月',yearly:'毎年',custom:'カスタム'}[t]||t;}

function savePM(){
  const title=document.getElementById('pm_title').value.trim();
  if(!title){showToast('⚠ タイトルを入力してください');return;}
  const isR=document.getElementById('pm_repeatOn').checked;
  let repeatId=null;
  if(isR){
    const isDate=document.getElementById('rEndD').checked;
    const oldRepeatId=editingPMId?schedules.find(s=>s.id===editingPMId)?.repeatId:null;
    if(oldRepeatId)repeatSeries=repeatSeries.filter(r=>r.id!==oldRepeatId);
    const sr={
      id:'r'+Date.now(),type:rType,
      interval:rType==='custom'?parseInt(document.getElementById('pm_rint').value)||1:1,
      unit:rType==='custom'?document.getElementById('pm_runit').value:'day',
      weekdays:[...rWeekdays],
      endMode:isDate?'date':'count',
      endCount:parseInt(document.getElementById('pm_rcnt').value)||12,
      endDate:document.getElementById('pm_renddate').value,
    };
    repeatSeries.push(sr);
    repeatId=sr.id;
  } else if(editingPMId){
    const old=schedules.find(s=>s.id===editingPMId);
    if(old?.repeatId)repeatSeries=repeatSeries.filter(r=>r.id!==old.repeatId);
  }
  const obj={
    type:'personal',title,product:'',
    start:new Date(document.getElementById('pm_start').value).toISOString(),
    end:new Date(document.getElementById('pm_end').value).toISOString(),
    factoryId:null,
    personId:document.getElementById('pm_person').value||null,
    color:pmColor,
    repeatId,
    notif:document.getElementById('pm_notifOn').checked,
    notifMin:parseInt(document.getElementById('pm_notifMin').value)||15,
    note:document.getElementById('pm_note').value,
  };
  if(editingPMId){Object.assign(schedules.find(x=>x.id===editingPMId),obj);showToast('✅ 個人予定を更新しました');}
  else{schedules.push({id:'s'+Date.now(),...obj});showToast('✅ 個人予定を追加しました'+(isR?' (繰り返し)':''));}
  closePM();scheduleNotifs();renderSidebar();renderCalendar();
}
function deletePM(){
  if(!editingPMId)return;
  const s=schedules.find(x=>x.id===editingPMId);
  if(s?.repeatId){
    showConfirm('🔁','繰り返し予定を削除','全ての繰り返し分が削除されます。',()=>{
      repeatSeries=repeatSeries.filter(r=>r.id!==s.repeatId);
      schedules=schedules.filter(x=>x.id!==editingPMId);
      closePM();renderSidebar();renderCalendar();showToast('🗑 繰り返し予定を削除しました');
    });
  } else {
    schedules=schedules.filter(x=>x.id!==editingPMId);
    closePM();renderSidebar();renderCalendar();showToast('🗑 個人予定を削除しました');
  }
}

// ══════════════════════════════
// NOTIFICATIONS
// ══════════════════════════════
function scheduleNotifs(){
  notifTimers.forEach(t=>clearTimeout(t));notifTimers=[];
  const now=Date.now();
  schedules.filter(s=>s.notif).forEach(s=>{
    const ms=new Date(s.start).getTime()-(s.notifMin*60000);
    const delay=ms-now;
    if(delay>0)notifTimers.push(setTimeout(()=>triggerNotif(s),delay));
  });
}
function triggerNotif(s){
  const p=persons.find(x=>x.id===s.personId);
  const msg=`${p?.name||'担当者未割当'} — ${s.title}`;
  addNotif('🔔',msg,`${fmtT(s.start)} 開始 (${s.notifMin}分前)`);
  showToast(`🔔 ${msg}`);
  if('Notification'in window&&Notification.permission==='granted')new Notification('工場スケジュール',{body:msg});
}
function addNotif(icon,text,sub){
  notifications.unshift({id:'n'+Date.now(),icon,text,sub,time:new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})});
  updateBadge();renderNP();
}
function updateBadge(){const b=document.getElementById('notifBadge');b.textContent=notifications.length;b.classList.toggle('show',notifications.length>0);}
function toggleNP(){document.getElementById('np').classList.toggle('open');renderNP();}
function renderNP(){
  const list=document.getElementById('npList');
  list.innerHTML=notifications.length===0?'<div class="np-empty">通知はありません</div>':
    notifications.map(n=>`<div class="np-item"><div style="font-size:17px;">${n.icon}</div><div><div>${n.text}</div><div class="np-time">${n.sub} · ${n.time}</div></div></div>`).join('');
}
function clearNotifs(){notifications=[];updateBadge();renderNP();}
function showToast(msg){
  const c=document.getElementById('toastWrap');
  const t=document.createElement('div');t.className='toast';t.textContent=msg;c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(55px)';t.style.transition='.28s';setTimeout(()=>t.remove(),280);},3200);
}
document.addEventListener('click',e=>{
  const np=document.getElementById('np');
  if(np.classList.contains('open')&&!np.contains(e.target)&&!document.getElementById('notifBtn').contains(e.target))np.classList.remove('open');
});

init();
</script>
